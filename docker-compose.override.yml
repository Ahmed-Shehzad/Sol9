services:
  orders.api:
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_HTTP_PORTS: 8080
      ASPNETCORE_HTTPS_PORTS: 8081
      REDIS_CONNECTION_STRING: redis
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Treblle__ApiKey: ${TREBLLE_API_KEY}
      Treblle__ProjectId: ${TREBLLE_PROJECT_ID}
    ports:
      - "5000:8080"
      - "5001:8081"
    depends_on:
      - postgres
      - redis
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
  
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - ./.postgresql/data:/var/lib/postgresql/data
  
  pgadmin:
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "15432:80"
    depends_on:
      - postgres
    volumes:
      - ./.pgadmin:/var/lib/pgadmin

  redis:
    ports:
      - "6379:6379" # Redis default port
      - "8001:8001" # Redis Stack Management UI port
    restart: always
    volumes:
      - ./.redis/data:/data
  
  portainer:
    restart: always
    ports:
      - "8000:8000"  # HTTP Management Port
      - "9443:9443"  # HTTPS Management Port
    volumes:
      - ./.portainer/var/run/docker.sock:/var/run/docker.sock  # Bind Docker socket
      - ./.portainer/data:/data                      # Persistent data storage
  
  sonarqube:
    restart: always
    ports:
      - "9000:9000" # SonarQube UI
    environment:
      SONAR_JDBC_URL: ${SONAR_JDBC_URL}
      SONAR_JDBC_USERNAME: ${SONAR_JDBC_USERNAME}
      SONAR_JDBC_PASSWORD: ${SONAR_JDBC_PASSWORD}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: true # Required for Docker-based setup
    depends_on:
      - postgres
    volumes:
      - ./.sonarqube/data:/opt/sonarqube/data
      - ./.sonarqube/logs:/opt/sonarqube/logs
      - ./.sonarqube/extensions:/opt/sonarqube/extensions
