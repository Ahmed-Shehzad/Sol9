name: Build and Deploy Docker Compose

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build, Scan, and Push Docker Images
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ordersapi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Set lowercase image name
        run: |
          LOWERCASE_STRING=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/sol9/${{ env.IMAGE_NAME }}:latest" | tr '[:upper:]' '[:lower:]')
          echo "LOWERCASE_STRING=$LOWERCASE_STRING" >> $GITHUB_ENV

      - name: Build and push orders.api image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Orders.API/Dockerfile
          push: true
          tags: |
            ${{ env.LOWERCASE_STRING }}

      - name: Official SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          dotnet-sonarscanner begin \
            /k:"Sol9" \
            /d:sonar.host.url="${SONAR_HOST_URL}" \
            /d:sonar.login="${SONAR_TOKEN}"
          dotnet build .\Sol9.sln
          dotnet-sonarscanner end /d:sonar.login="${SONAR_TOKEN}"
