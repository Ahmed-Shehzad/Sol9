name: Build and Deploy Docker Compose

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ordersapi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build and push orders.api image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Orders.API/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/sol9/${{ env.IMAGE_NAME }}:latest | tr '[:upper:]' '[:lower:]'

      - name: Start Docker Compose for services
        run: |
          docker-compose -f docker-compose.yml up -d --build

      - name: Verify Services
        run: |
          docker ps
          docker logs orders.api
          docker logs pgadmin4
          docker logs postgres
          docker logs redis
          docker logs portainer

      - name: Official SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4.1.0

