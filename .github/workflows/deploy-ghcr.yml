name: Build and Deploy Docker Containers with Docker Compose to GHCR and Expose Services with ngrok

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy Docker Containers and Expose Services
    runs-on: ubuntu-latest

    services:
      # Define services like Postgres, Redis, etc. in the GitHub Actions runner.
      postgres:
        image: postgis/postgis:16-3.4-alpine
        ports:
          - 5432:5432
      redis:
        image: redis/redis-stack:latest
        ports:
          - 6379:6379
      sonarqube:
        image: sonarqube:lts-community
        ports:
          - 9000:9000
      pgadmin:
        image: dpage/pgadmin4:latest
        ports:
          - 15432:80
      portainer:
        image: portainer/portainer-ee:2.21.4
        ports:
          - 8000:8000
          - 9443:9443

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      # Step 2: Set up .NET 8
      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4.1.0
        with:
          dotnet-version: 8.0.x

      # Step 3: Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false

      # Step 4: Build the Docker image for orders.api
      - name: Build Docker image for orders.api
        run: |
          docker build -t ghcr.io/ahmed-shehzad/sol9/ordersapi:latest -f Orders.API/Dockerfile .

      # Step 5: Push the Docker image for orders.api to GHCR
      - name: Push Docker image to GHCR
        run: |
          docker push ghcr.io/ahmed-shehzad/sol9/ordersapi:latest

      # Step 6: Set up Docker Compose and deploy services using the override file
      - name: Set up Docker Compose
        run: |
          # Create a .env file for environment variables
          echo "ASPNETCORE_ENVIRONMENT=Development" >> .env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "TREBLLE_API_KEY=${{ secrets.TREBLLE_API_KEY }}" >> .env
          echo "TREBLLE_PROJECT_ID=${{ secrets.TREBLLE_PROJECT_ID }}" >> .env
          echo "SSL_PASSWORD=${{ secrets.SSL_PASSWORD }}" >> .env
          echo "PGADMIN_DEFAULT_EMAIL=${{ secrets.PGADMIN_DEFAULT_EMAIL }}" >> .env
          echo "PGADMIN_DEFAULT_PASSWORD=${{ secrets.PGADMIN_DEFAULT_PASSWORD }}" >> .env
          echo "SONAR_JDBC_URL=${{ secrets.SONAR_JDBC_URL }}" >> .env
          echo "SONAR_JDBC_USERNAME=${{ secrets.SONAR_JDBC_USERNAME }}" >> .env
          echo "SONAR_JDBC_PASSWORD=${{ secrets.SONAR_JDBC_PASSWORD }}" >> .env

          # Run docker-compose with override file
          docker-compose -f docker-compose.yml -f docker-compose.override.yml up -d

      # Step 7: Install ngrok to expose URLs
      - name: Install ngrok
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          wget https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.zip
          unzip ngrok-stable-linux-amd64.zip
          sudo mv ngrok /usr/local/bin

      # Step 8: Expose services using ngrok
      - name: Expose services with ngrok
        run: |
          # Start ngrok for ordersapi (port 5000)
          nohup ngrok http 5000 > ordersapi-ngrok.log &
          sleep 10  # Wait for ngrok to establish the tunnel
          ORDER_API=$(grep -o 'https://[a-z0-9]*\.ngrok.io' ordersapi-ngrok.log | tail -n 1)
          echo "ORDER API URL: $ORDER_API"

          # Start ngrok for SonarQube (port 9000)
          nohup ngrok http 9000 > sonarqube-ngrok.log &
          sleep 10  # Wait for ngrok to establish the tunnel
          SONAR_URL=$(grep -o 'https://[a-z0-9]*\.ngrok.io' sonarqube-ngrok.log | tail -n 1)
          echo "SonarQube URL: $SONAR_URL"

          # Start ngrok for Redis (port 6379)
          nohup ngrok tcp 6379 > redis-ngrok.log &
          sleep 10  # Wait for ngrok to establish the tunnel
          REDIS_URL=$(grep -o 'https://[a-z0-9]*\.ngrok.io' redis-ngrok.log | tail -n 1)
          echo "Redis URL: $REDIS_URL"

          # Start ngrok for Redis UI (port 8001)
          nohup ngrok tcp 8001 > redis-ngrok.log &
          sleep 10  # Wait for ngrok to establish the tunnel
          REDIS_UI_URL=$(grep -o 'https://[a-z0-9]*\.ngrok.io' redis-ngrok.log | tail -n 1)
          echo "Redis UI URL: $REDIS_UI_URL"

          # Start ngrok for Postgres (port 5432)
          nohup ngrok tcp 5432 > postgres-ngrok.log &
          sleep 10  # Wait for ngrok to establish the tunnel
          POSTGRESQL_URL=$(grep -o 'https://[a-z0-9]*\.ngrok.io' postgres-ngrok.log | tail -n 1)
          echo "Postgres URL: $POSTGRESQL_URL"

          # Start ngrok for PgAdmin (port 80)
          nohup ngrok http 15432 > pgadmin-ngrok.log &
          sleep 10  # Wait for ngrok to establish the tunnel
          PGADMIN_URL=$(grep -o 'https://[a-z0-9]*\.ngrok.io' pgadmin-ngrok.log | tail -n 1)
          echo "PgAdmin URL: $PGADMIN_URL"

          # Start ngrok for Portainer (port 8000)
          nohup ngrok http 8000 > portainer-ngrok.log &
          sleep 10  # Wait for ngrok to establish the tunnel
          PORTAINER_URL=$(grep -o 'https://[a-z0-9]*\.ngrok.io' portainer-ngrok.log | tail -n 1)
          echo "Portainer URL: $PORTAINER_URL"

    #   # Step 9: Verify the deployment by checking the API
